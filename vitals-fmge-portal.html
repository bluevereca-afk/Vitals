<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VITALS — FMGE Command Center</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VITALS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0E12">
<meta name="description" content="Elite FMGE Study Portal — 8-week timetable, AI tutor, spaced repetition, mistake notebook.">
<link rel="manifest" id="pwa-manifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0E12;
  --surface:#11161D;
  --surface2:#161D26;
  --border:#232B36;
  --text:#E8EDF2;
  --muted:#8A97A6;
  --teal:#21C7B0;
  --teal-dim:rgba(33,199,176,0.12);
  --amber:#F2A93B;
  --amber-dim:rgba(242,169,59,0.12);
  --red:#E2473A;
  --red-dim:rgba(226,71,58,0.12);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
.font-display{font-family:'Space Grotesk',sans-serif;}
.font-mono{font-family:'IBM Plex Mono',monospace;}
::selection{background:var(--teal-dim);}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}

/* layout */
#app{display:flex;min-height:100vh;}
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 22px;}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),#0B8E7E);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Space Grotesk';color:#06141A;font-size:15px;flex-shrink:0;}
.brand-text{font-family:'Space Grotesk';font-weight:700;font-size:15px;letter-spacing:0.04em;}
.brand-sub{font-size:10px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:1px;}

.navgroup{margin-top:6px;}
.navlabel{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:14px 12px 6px;}
.navitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13.5px;color:var(--muted);margin-bottom:2px;transition:background .15s,color .15s;border:none;background:transparent;width:100%;text-align:left;}
.navitem:hover{background:var(--surface2);color:var(--text);}
.navitem.active{background:var(--teal-dim);color:var(--teal);font-weight:600;}
.navitem .ico{width:18px;text-align:center;font-size:14px;flex-shrink:0;}

.sidebar-foot{margin-top:auto;padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);line-height:1.5;}

/* vitals strip */
.vitals{position:sticky;top:0;z-index:20;background:rgba(10,14,18,0.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 26px;display:flex;align-items:center;gap:28px;overflow-x:auto;}
.vital{display:flex;flex-direction:column;gap:2px;min-width:max-content;}
.vital-label{font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.vital-value{font-family:'IBM Plex Mono';font-size:18px;font-weight:600;color:var(--text);}
.vital-value.teal{color:var(--teal);}
.vital-value.amber{color:var(--amber);}
.vital-divider{width:1px;height:28px;background:var(--border);flex-shrink:0;}
.scanline-wrap{flex:1;height:24px;position:relative;overflow:hidden;min-width:120px;}
.scanline-wrap svg{width:100%;height:100%;}
.scan-path{fill:none;stroke:var(--teal);stroke-width:1.5;opacity:0.55;}
.scan-dot{fill:var(--teal);filter:drop-shadow(0 0 4px var(--teal));}

/* content */
.content{padding:26px 30px 60px;max-width:1180px;width:100%;margin:0 auto;}
.page{animation:fadein .35s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.h1{font-family:'Space Grotesk';font-size:26px;font-weight:700;letter-spacing:-0.01em;margin:0 0 4px;}
.h2{font-family:'Space Grotesk';font-size:16px;font-weight:600;margin:0 0 2px;}
.sub{color:var(--muted);font-size:13px;margin:0 0 22px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;}
.card.glass{background:rgba(17,22,29,0.6);backdrop-filter:blur(10px);}
.grid{display:grid;gap:14px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:900px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;} .sidebar{display:none;} .content{padding:18px 14px 50px;}}

.statcard{padding:16px 18px;}
.statcard .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.statcard .val{font-family:'IBM Plex Mono';font-size:26px;font-weight:600;}
.statcard .delta{font-size:11.5px;color:var(--muted);margin-top:6px;}

.pillbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.pill{padding:6px 13px;border-radius:20px;font-size:12.5px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .15s;}
.pill.active{background:var(--teal-dim);border-color:var(--teal);color:var(--teal);font-weight:600;}
.pill:hover{color:var(--text);}

.progress-track{height:8px;background:var(--surface2);border-radius:5px;overflow:hidden;}
.progress-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--teal),#5EE8D5);transition:width .4s ease;}
.progress-fill.amber{background:linear-gradient(90deg,var(--amber),#FFD27D);}

.badge{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;letter-spacing:0.03em;}
.badge.hy{background:var(--amber-dim);color:var(--amber);}
.badge.ly{background:var(--surface2);color:var(--muted);}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:600;transition:all .15s;}
.btn:hover{border-color:var(--teal);color:var(--teal);}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#06141A;}
.btn.primary:hover{background:#28E0C6;color:#06141A;}
.btn.danger:hover{border-color:var(--red);color:var(--red);}
.btn:disabled{opacity:0.45;cursor:not-allowed;}
.btn.sm{padding:6px 11px;font-size:12px;}

select,input[type=text],input[type=date],textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;width:100%;}
select:focus,input:focus,textarea:focus{border-color:var(--teal);}
label.field-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:5px;}

hr.div{border:none;border-top:1px solid var(--border);margin:18px 0;}

/* checkbox */
.chk{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface2);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.chk.done{background:var(--teal);border-color:var(--teal);}
.chk.done::after{content:'✓';font-size:11px;color:#06141A;font-weight:700;}

/* tables */
table.imap{width:100%;border-collapse:collapse;font-size:12.5px;}
table.imap th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border);}
table.imap td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.45;}
table.imap tr:hover td{background:var(--surface2);}
table.imap td.sys{font-weight:600;color:var(--teal);white-space:nowrap;}

/* timetable */
.week-card{margin-bottom:14px;}
.week-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.week-head .meta{display:flex;align-items:center;gap:12px;}
.weeknum{font-family:'IBM Plex Mono';font-size:12px;color:var(--teal);background:var(--teal-dim);padding:3px 9px;border-radius:6px;}
.day-block{border-top:1px solid var(--border);padding:14px 2px 4px;}
.day-title{font-family:'Space Grotesk';font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.slot-row{display:flex;align-items:flex-start;gap:10px;padding:6px 4px;border-radius:7px;}
.slot-row:hover{background:var(--surface2);}
.slot-time{font-family:'IBM Plex Mono';font-size:10.5px;color:var(--muted);min-width:78px;padding-top:1px;}
.slot-text{font-size:12.8px;line-height:1.4;flex:1;}
.slot-text.done{color:var(--muted);text-decoration:line-through;}
.chev{transition:transform .2s;color:var(--muted);}
.chev.open{transform:rotate(90deg);}

/* topics tree */
.topic-row{border-bottom:1px solid var(--border);}
.topic-head{display:flex;align-items:center;justify-content:space-between;padding:13px 4px;cursor:pointer;}
.topic-head .left{display:flex;align-items:center;gap:10px;}
.sub-row{display:flex;align-items:center;gap:10px;padding:8px 4px 8px 30px;}
.sub-row:hover{background:var(--surface2);border-radius:8px;}

/* flashcard */
.flash{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:22px;min-height:130px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:14.5px;line-height:1.5;cursor:pointer;transition:border-color .2s;}
.flash:hover{border-color:var(--teal);}

.tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:6px;background:var(--surface2);color:var(--muted);margin-right:6px;}

.empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:80px;right:16px;background:var(--surface2);border:1px solid var(--teal);color:var(--text);padding:11px 18px;border-radius:10px;font-size:13px;z-index:200;animation:fadein .25s ease;box-shadow:0 8px 30px rgba(0,0,0,0.4);}

/* ── Mobile bottom nav ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(17,22,29,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 4px calc(8px + env(safe-area-inset-bottom));display:none;justify-content:space-around;align-items:center;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-size:10px;font-family:inherit;cursor:pointer;min-width:52px;transition:color .15s;}
.bnav-item .bico{font-size:18px;line-height:1;}
.bnav-item.active{color:var(--teal);}
.bnav-item:hover{color:var(--text);}
@media(max-width:600px){
  .sidebar{display:none!important;}
  .bottom-nav{display:flex!important;}
  .main{padding-bottom:calc(64px + env(safe-area-inset-bottom));}
  .vitals{padding:10px 14px;}
  .content{padding:16px 14px 80px;}
  .grid-4,.grid-3{grid-template-columns:1fr 1fr;}
  .grid-2{grid-template-columns:1fr;}
  table.imap{font-size:11px;}
  table.imap td,table.imap th{padding:6px 5px;}
}
</style>
</head>

<script id="app-script">
/* ---------- Storage adapter (Claude artifact storage, falls back to localStorage standalone) ---------- */
const hasClaudeStorage = !!(window.storage && window.storage.get);
const Store = {
  async get(key){
    if(hasClaudeStorage){
      try{ const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }catch(e){ return null; }
    } else {
      try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }catch(e){ return null; }
    }
  },
  async set(key,val){
    if(hasClaudeStorage){
      try{ await window.storage.set(key, JSON.stringify(val)); }catch(e){}
    } else {
      try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
    }
  }
};

/* ---------- Global state ---------- */
let STATE = {
  topicDone: {},        // id -> {done:true, date:ISO}
  ttDone: {},           // "w{n}-{day}-{blockIdx}" -> true
  mistakes: [],         // [{id,subject,topic,question,answer,notes,added,reviewStage,nextReview}]
  reviews: [],          // [{id,subject,topic,dueDate,stage}]
  xp: 0,
  streak: 0,
  lastActive: null,
  studyLog: {},         // date -> hours
  quizStats: {correct:0, total:0},
  examDate: null,
  flashCache: {},        // "subject||topic" -> [{front,back}]
};
let ROUTE = "dashboard";
let openWeek = 1;
let openTopicSubject = "anatomy";
let openTopicIdx = null;

function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDays(dstr,n){ const d=new Date(dstr+"T00:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

async function loadState(){
  const keys = ["topicDone","ttDone","mistakes","reviews","xp","streak","lastActive","studyLog","quizStats","examDate","startDate"];
  for(const k of keys){
    const v = await Store.get(k);
    if(v !== null && v !== undefined) STATE[k] = v;
  }
  touchStreak();
}
function touchStreak(){
  const t = todayStr();
  if(STATE.lastActive === t) return;
  if(STATE.lastActive === addDays(t,-1)){ STATE.streak += 1; }
  else if(STATE.lastActive === null){ STATE.streak = 1; }
  else { STATE.streak = 1; }
  STATE.lastActive = t;
  Store.set("lastActive", STATE.lastActive);
  Store.set("streak", STATE.streak);
}
function addXP(n){ STATE.xp += n; Store.set("xp", STATE.xp); }
function levelInfo(){
  const lvl = Math.floor(STATE.xp/100)+1;
  const into = STATE.xp%100;
  return {lvl, into, next:100};
}
function toast(msg){
  const el = document.createElement("div");
  el.className="toast"; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

/* ---------- Topic helpers ---------- */
function allLeaves(){
  const out=[];
  for(const subj in TOPICS){
    TOPICS[subj].forEach((t,ti)=>t.subs.forEach((s,si)=>{
      out.push({id:`${subj}-${ti}-${si}`, subject:subj, topic:t.name, name:s.n, hy:s.hy});
    }));
  }
  return out;
}
function leafProgress(subj){
  const leaves = allLeaves().filter(l=>l.subject===subj);
  const done = leaves.filter(l=>STATE.topicDone[l.id]?.done).length;
  return {done, total:leaves.length};
}
function overallProgress(){
  const leaves = allLeaves();
  const done = leaves.filter(l=>STATE.topicDone[l.id]?.done).length;
  return {done, total:leaves.length, pct: leaves.length? Math.round(done/leaves.length*100):0};
}
function leafMeta(id){
  const [subj,ti,si] = id.split("-");
  const t = TOPICS[subj][+ti];
  return {subject:subj, topic:t.name, name:t.subs[+si].n};
}
function toggleLeaf(id){
  const cur = STATE.topicDone[id];
  if(cur && cur.done){
    delete STATE.topicDone[id];
  } else {
    STATE.topicDone[id] = {done:true, date:todayStr()};
    addXP(10);
    scheduleReviews(id, leafMeta(id));
    touchStreak();
  }
  Store.set("topicDone", STATE.topicDone);
}
function scheduleReviews(id, meta){
  const t = todayStr();
  [1,7,30].forEach(days=>{
    STATE.reviews.push({
      id: id+"-r"+days+"-"+Date.now(),
      leafId:id, subject:meta.subject, topic:meta.topic, name:meta.name,
      dueDate: addDays(t,days), stage: days, done:false
    });
  });
  Store.set("reviews", STATE.reviews);
}
function dueReviews(){
  const t = todayStr();
  return STATE.reviews.filter(r=>!r.done && r.dueDate<=t).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
}
function upcomingReviews(){
  const t = todayStr();
  return STATE.reviews.filter(r=>!r.done && r.dueDate>t).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,8);
}
function markReviewDone(id){
  const r = STATE.reviews.find(x=>x.id===id);
  if(r){ r.done=true; addXP(3); touchStreak(); Store.set("reviews",STATE.reviews); render(); }
}

/* ---------- Timetable helpers ---------- */
function ttKey(w,day,idx){ return `w${w}-${day}-${idx}`; }
function toggleTT(w,day,idx){
  const k = ttKey(w,day,idx);
  if(STATE.ttDone[k]){ delete STATE.ttDone[k]; }
  else { STATE.ttDone[k]=true; addXP(5); touchStreak(); }
  Store.set("ttDone", STATE.ttDone);
  render();
}
function weekProgress(w){
  const week = WEEKS.find(x=>x.n===w);
  let total=0, done=0;
  Object.keys(week.days).forEach(day=>{
    week.days[day].forEach((_,idx)=>{ total++; if(STATE.ttDone[ttKey(w,day,idx)]) done++; });
  });
  return {done,total};
}

/* ---------- Mistake notebook ---------- */
function addMistake(m){
  const t = todayStr();
  const entry = {id:"m"+Date.now(), subject:m.subject, topic:m.topic, question:m.question, answer:m.answer, notes:m.notes||"", added:t, reviewStage:0, nextReview:addDays(t,1), cleared:false};
  STATE.mistakes.unshift(entry);
  Store.set("mistakes", STATE.mistakes);
  touchStreak();
}
function clearMistake(id){
  STATE.mistakes = STATE.mistakes.filter(m=>m.id!==id);
  Store.set("mistakes", STATE.mistakes);
  addXP(2);
  render();
}
function snoozeMistake(id){
  const m = STATE.mistakes.find(x=>x.id===id);
  if(m){ m.reviewStage++; m.nextReview = addDays(todayStr(), m.reviewStage>=2?7:1); Store.set("mistakes",STATE.mistakes); render(); }
}

/* ---------- AI Companion ---------- */
async function callClaude(prompt){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      messages:[{role:"user", content:prompt}]
    })
  });
  if(!res.ok) throw new Error("API error "+res.status);
  const data = await res.json();
  return (data.content||[]).map(c=>c.text||"").join("\n").trim();
}
function stripFence(s){ return s.replace(/```json|```/g,"").trim(); }

/* ---------- Router ---------- */
function nav(route){ ROUTE = route; render(); window.scrollTo(0,0); }

const NAVS = [
  {group:"Command", items:[
    {id:"dashboard", label:"Dashboard", ico:"◈"},
    {id:"strategy", label:"Strategy Blueprint", ico:"≡"},
  ]},
  {group:"Execute", items:[
    {id:"timetable", label:"8-Week Timetable", ico:"▦"},
    {id:"topics", label:"Topic Bank", ico:"▤"},
    {id:"lab", label:"AI Study Lab", ico:"✦"},
  ]},
  {group:"Memory", items:[
    {id:"mistakes", label:"Mistake Notebook", ico:"✕"},
    {id:"revision", label:"Revision Scheduler", ico:"↻"},
    {id:"analytics", label:"Analytics", ico:"▣"},
  ]},
  {group:"", items:[
    {id:"settings", label:"Settings", ico:"⚙"},
  ]}
];

function renderSidebar(){
  let html = `<div class="brand"><div class="brand-mark">V</div><div><div class="brand-text">VITALS</div><div class="brand-sub">FMGE Command Center</div></div></div>`;
  NAVS.forEach(g=>{
    if(g.group) html += `<div class="navlabel">${g.group}</div>`;
    g.items.forEach(it=>{
      html += `<button class="navitem ${ROUTE===it.id?'active':''}" onclick="nav('${it.id}')"><span class="ico">${it.ico}</span>${it.label}</button>`;

function renderTodayCard(){

function blockPurpose(label){
  const map = {
    "Startup Routine":"Phone away, re-read today's targets, 5-min light movement — momentum before content.",

    "Deep Concept Block 2":"Second deep concept — different subject from Block 1 to keep engagement high.",
    "Same-Day Revision":"Blank-sheet recall of yesterday's Block 1+2 before adding anything new today.",
    "Deep Concept Block 3":"Pathology, pharmacology, or microbiology — system-linked to the morning's anatomy/physiology.",
    "MCQ Block":"Timed MCQs across today's subjects — applied recall, not just reading.",
    "Clinical Integration / PYQ":"One explicit cross-subject chain + previous-year questions on today's system.",
    "Active Recall (Night)":"Closed-book recall of the entire day, written or spoken from memory.",
    "Mistake Log + Plan Tomorrow":"Log every wrong MCQ, tag weak topics, set tomorrow's 3 priorities."

  return map[label]||"";
}

function quickAddMistakeFromIndex(qi){

function escapeAttr(s){ return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function renderFlashCard(c, ci){
  return `<div class="flash" data-front="${escapeAttr(c.front)}" data-back="${escapeAttr(c.back)}" data-shown="0" onclick="flipCard(this)">
    <div><div class="tag">Front</div><br>${escapeHtml(c.front)}</div>
  </div>`;
}
function flipCard(el){
  const showingBack = el.dataset.shown === "1";
  el.dataset.shown = showingBack ? "0" : "1";
  const label = showingBack ? "Front" : "Answer";
  const text = showingBack ? el.dataset.front : el.dataset.back;
  el.innerHTML = `<div><div class="tag">${label}</div><br>${text}</div>`;
}
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function runLab(){
  if(!labTopic){ toast("Pick a topic first"); return; }
  labLoading=true; labError=null; labOutput=null; render();
  try{
    let prompt, parseType="text";
    const ctx = `${labTopic} (${SUBJECTS[labSubject].label}) for FMGE (NEET PG-level Indian medical licensing exam) prep`;
    if(labMode==="teach") prompt = `Teach ${ctx} in a clear, structured way using short headings and bullet points. Include one high-yield clinical correlation. Keep it focused, under 400 words. Plain text only, no JSON.`;
    if(labMode==="explain") prompt = `Explain ${ctx} as simply as possible, like a first-time learner, using one short analogy. Under 250 words. Plain text only, no JSON.`;
    if(labMode==="quiz"){ prompt = `Generate exactly 5 FMGE-style MCQs on ${ctx}, each with 4 options. Return ONLY valid JSON, no markdown fences, no preamble: [{"question":"...","options":{"A":"...","B":"...","C":"...","D":"..."},"answer":"A","explanation":"..."}]`; parseType="quiz"; }
    if(labMode==="case"){ prompt = `Write one realistic FMGE-style clinical vignette testing ${ctx}, with 4 options labeled A-D, the correct answer, and a short explanation. Return ONLY valid JSON, no markdown fences: {"vignette":"...","options":{"A":"...","B":"...","C":"...","D":"..."},"answer":"A","explanation":"..."}`; parseType="case"; }
    if(labMode==="flash"){ prompt = `Generate exactly 8 high-yield flashcards on ${ctx}. Return ONLY valid JSON, no markdown fences: [{"front":"...","back":"..."}]`; parseType="flash"; }

    const raw = await callClaude(prompt);
    if(parseType==="text"){ labOutput = {type:"text", text:raw}; }
    else { const parsed = JSON.parse(stripFence(raw)); labOutput = {type:parseType, data:parsed}; }
    addXP(5); touchStreak();
  }catch(e){
    labError = "Something went wrong reaching the AI Study Lab. Try again, or pick a different topic. (" + e.message + ")";
  }
  labLoading=false; render();
}

    ]
  };
  const blob = new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});

}

/* ---------- PWA — Service Worker (offline cache) ---------- */
function registerSW(){
  if(!("serviceWorker" in navigator)) return;
  const swCode = `
const CACHE = "vitals-v1";
const ASSETS = [self.location.href.replace(/\\/sw-[\\w]+\\.js$/,"")];
self.addEventListener("install", e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener("activate", e => {
  e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener("fetch", e => {
  if(e.request.method !== "GET") return;
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
    const clone = res.clone();
    caches.open(CACHE).then(c => c.put(e.request, clone));
    return res;
  }).catch(()=>caches.match(e.request))));
});`;
  const blob = new Blob([swCode],{type:"application/javascript"});
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

/* ---------- Export / Import ---------- */
function exportProgress(){
  const data = {topicDone:STATE.topicDone, ttDone:STATE.ttDone, mistakes:STATE.mistakes, reviews:STATE.reviews, xp:STATE.xp, streak:STATE.streak, lastActive:STATE.lastActive, quizStats:STATE.quizStats, examDate:STATE.examDate, startDate:STATE.startDate};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="vitals-backup-"+todayStr()+".json"; a.click();
  toast("Backup downloaded");
}
function importProgress(){
  const inp = document.createElement("input"); inp.type="file"; inp.accept=".json";
  inp.onchange = async e => {
    try{
      const txt = await e.target.files[0].text();
      const d = JSON.parse(txt);
      const keys = ["topicDone","ttDone","mistakes","reviews","xp","streak","lastActive","quizStats","examDate","startDate"];
      for(const k of keys){ if(d[k]!==undefined){ STATE[k]=d[k]; await Store.set(k,d[k]); }}
      toast("Progress restored ✓"); render();
    }catch(err){ toast("Import failed — invalid file"); }
  };
  inp.click();
}
